groups:
  - name: alertes-meteo-app
    rules:

      # Alerte si l'application est DOWN
      - alert: ApplicationIndisponible
        expr: up{job="app-monitoring-meteo"} == 0
        for: 10s
        labels:
          severity: critical
        annotations:
          summary: "🚨 Application Spring Boot indisponible"
          description: "L'application {{ $labels.instance }} est DOWN depuis plus de 10 secondes."

      # Alerte si la latence moyenne dépasse 1 seconde
      - alert: LatenceElevee
        expr: rate(http_server_requests_seconds_sum[1m]) / rate(http_server_requests_seconds_count[1m]) > 1
        for: 30s
        labels:
          severity: warning
        annotations:
          summary: "  Latence élevée détectée"
          description: "La latence moyenne est supérieure à 1s depuis 30 secondes."

      # Alerte si la mémoire heap dépasse 80%
      - alert: MemoireHeapCritique
        expr: (jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"}) > 0.8
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "⚠️  Mémoire Heap JVM > 80%"
          description: "La mémoire heap utilisée dépasse 80% depuis 1 minute."